services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: basalt
      POSTGRES_PASSWORD: basalt
      POSTGRES_DB: basalt
      POSTGRES_READONLY_USER: basalt_readonly
      POSTGRES_READONLY_PASSWORD: basalt_readonly
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-readonly-user.sh:/docker-entrypoint-initdb.d/02-readonly-user.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basalt -d basalt"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
